name: Companion Release

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      - name: Build companion
        run: pnpm --filter @workspace/companion run build
      - name: Package companion
        run: pnpm --filter @workspace/companion run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-windows
          path: artifacts/companion/dist/*.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      - name: Build companion
        run: pnpm --filter @workspace/companion run build
      - name: Package companion
        run: pnpm --filter @workspace/companion run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-macos
          path: artifacts/companion/dist/*.dmg
          if-no-files-found: error

  release:
    name: Update GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-windows
          path: dist
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-macos
          path: dist
      - name: Upload to GitHub release tagged "main"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main
          name: Latest (main)
          prerelease: true
          files: dist/*
