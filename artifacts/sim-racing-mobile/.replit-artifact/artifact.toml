kind = "mobile"
previewPath = "/mobile/"
title = "Sim Racing HQ Mobile"
version = "1.0.0"
id = "artifacts/sim-racing-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25643

[services.development]
run = "pnpm --filter @workspace/sim-racing-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sim-racing-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sim-racing-mobile", "run", "serve" ]

[services.env]
PORT = "25643"
BASE_PATH = "/mobile/"
