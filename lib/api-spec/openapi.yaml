openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Sim Racing HQ API — F1 sim companion
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Racing session operations
  - name: setups
    description: Car setup operations
  - name: trackNotes
    description: Track notes operations
  - name: hardware
    description: Hardware settings operations
  - name: community
    description: Community setup sharing operations
  - name: companion
    description: Companion app API key and session upload
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    get:
      operationId: getSessions
      tags: [sessions]
      summary: Get all sessions for current user
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /sessions/{id}:
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{id}/share:
    post:
      operationId: shareSession
      tags: [sessions]
      summary: Toggle public sharing on a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareSessionRequest"
      responses:
        "200":
          description: Share state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /setups:
    get:
      operationId: getSetups
      tags: [setups]
      summary: Get all setups for current user
      responses:
        "200":
          description: List of setups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SetupRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createSetup
      tags: [setups]
      summary: Create a new setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSetupRequest"
      responses:
        "201":
          description: Setup created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /setups/{id}:
    delete:
      operationId: deleteSetup
      tags: [setups]
      summary: Delete a setup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Setup deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /setups/{id}/share:
    post:
      operationId: shareSetup
      tags: [setups]
      summary: Toggle public sharing on a setup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Share state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareSetupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /community/sessions:
    get:
      operationId: getCommunitySessions
      tags: [community]
      summary: Get all publicly shared sessions
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of community sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunitySessionRecord"

  /community/setups:
    get:
      operationId: getCommunitySetups
      tags: [community]
      summary: Get all publicly shared setups
      parameters:
        - name: trackId
          in: query
          required: false
          schema:
            type: string
        - name: car
          in: query
          required: false
          schema:
            type: string
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: gameVersion
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of community setups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunitySetupRecord"

  /community/setups/{id}:
    get:
      operationId: getCommunitySetup
      tags: [community]
      summary: Get a single public community setup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Community setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunitySetupRecord"
        "404":
          $ref: "#/components/responses/NotFound"

  /community/setups/{id}/rate:
    post:
      operationId: rateSetup
      tags: [community]
      summary: Rate a community setup (1-5 stars)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateSetupRequest"
      responses:
        "200":
          description: Rating saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateSetupResponse"
        "400":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/NotFound"
        "404":
          $ref: "#/components/responses/NotFound"

  /community/setups/{id}/import:
    post:
      operationId: importSetup
      tags: [community]
      summary: Import a community setup into the caller's vault
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Setup imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /hardware:
    get:
      operationId: getHardware
      tags: [hardware]
      summary: Get all hardware profiles for current user
      responses:
        "200":
          description: List of hardware profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HardwareRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createHardware
      tags: [hardware]
      summary: Create a new hardware profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHardwareRequest"
      responses:
        "201":
          description: Hardware profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /hardware/{id}:
    delete:
      operationId: deleteHardware
      tags: [hardware]
      summary: Delete a hardware profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Hardware profile deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /track-difficulty:
    get:
      operationId: getTrackDifficulty
      tags: [trackNotes]
      summary: Get all track difficulty ratings for the current user
      responses:
        "200":
          description: List of track difficulty ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackDifficultyRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /track-difficulty/{trackId}:
    put:
      operationId: upsertTrackDifficulty
      tags: [trackNotes]
      summary: Set or clear a track difficulty rating
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertTrackDifficultyRequest"
      responses:
        "200":
          description: Difficulty rating saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackDifficultyRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /companion/apikey:
    get:
      operationId: getCompanionApiKeyStatus
      tags: [companion]
      summary: Get API key status for the current user
      responses:
        "200":
          description: API key status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanionApiKeyStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: generateCompanionApiKey
      tags: [companion]
      summary: Generate (or regenerate) an API key for the current user
      responses:
        "200":
          description: New raw API key — shown once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanionApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: revokeCompanionApiKey
      tags: [companion]
      summary: Revoke the current user's API key
      responses:
        "204":
          description: Key revoked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /companion/session:
    post:
      operationId: uploadCompanionSession
      tags: [companion]
      summary: Upload a session from the companion app (API key auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanionSessionRequest"
      responses:
        "201":
          description: Session uploaded — returns the created session record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecord"
        "400":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /track-notes/{trackId}:
    get:
      operationId: getTrackNotes
      tags: [trackNotes]
      summary: Get track notes for a specific track
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Track notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackNotesRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: upsertTrackNotes
      tags: [trackNotes]
      summary: Create or update track notes for a specific track
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertTrackNotesRequest"
      responses:
        "200":
          description: Track notes saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackNotesRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CornerNote:
      type: object
      properties:
        id:
          type: string
        number:
          type: integer
        name:
          type: string
        gear:
          type: string
        brakingPoint:
          type: string
        lineNotes:
          type: string
        myNotes:
          type: string
      required:
        - id
        - number
        - name
        - gear
        - brakingPoint
        - lineNotes
        - myNotes

    LapTraceSample:
      type: object
      properties:
        d:
          type: number
        speed:
          type: number
        throttle:
          type: number
        brake:
          type: number
        steer:
          type: number
      required:
        - d
        - speed
        - throttle
        - brake
        - steer

    LapRecord:
      type: object
      properties:
        lap:
          type: integer
        time:
          type: string
        s1:
          type: string
        s2:
          type: string
        s3:
          type: string
        tires:
          type: string
        penalty:
          type: string
        trace:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/LapTraceSample"
      required:
        - lap
        - time
        - s1
        - s2
        - s3
        - tires
        - penalty

    WingDamage:
      type: object
      properties:
        front:
          type: number
        rear:
          type: number
      required:
        - front
        - rear

    CarSetupSnapshot:
      type: object
      properties:
        frontWing:
          type: number
        rearWing:
          type: number
        onThrottle:
          type: number
        offThrottle:
          type: number
        frontCamber:
          type: number
        rearCamber:
          type: number
        frontToe:
          type: number
        rearToe:
          type: number
        frontSuspension:
          type: number
        rearSuspension:
          type: number
        frontAntiRollBar:
          type: number
        rearAntiRollBar:
          type: number
        frontRideHeight:
          type: number
        rearRideHeight:
          type: number
        brakePressure:
          type: number
        brakeBias:
          type: number
        frontTyrePressure:
          type: number
        rearTyrePressure:
          type: number
      required:
        - frontWing
        - rearWing
        - onThrottle
        - offThrottle
        - frontCamber
        - rearCamber
        - frontToe
        - rearToe
        - frontSuspension
        - rearSuspension
        - frontAntiRollBar
        - rearAntiRollBar
        - frontRideHeight
        - rearRideHeight
        - brakePressure
        - brakeBias
        - frontTyrePressure
        - rearTyrePressure

    TyreStintEntry:
      type: object
      properties:
        startLap:
          type: integer
        endLap:
          type: integer
        compound:
          type: string
        visualCompound:
          type: string
      required:
        - startLap
        - endLap
        - compound
        - visualCompound

    LapHistoryEntry:
      type: object
      properties:
        lap:
          type: integer
        lapTimeMs:
          type: integer
        sector1Ms:
          type: integer
        sector2Ms:
          type: integer
        sector3Ms:
          type: integer
        valid:
          type: boolean
      required:
        - lap
        - lapTimeMs
        - sector1Ms
        - sector2Ms
        - sector3Ms
        - valid

    SessionRecord:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        trackId:
          type: string
        car:
          type: string
        type:
          type: string
        bestLap:
          type: string
        avgLap:
          type: string
        worstLap:
          type: string
        s1:
          type: string
        s2:
          type: string
        s3:
          type: string
        tires:
          type: string
        fuelLoad:
          type: number
        conditions:
          type: string
        assists:
          type: string
        rating:
          type: integer
        notes:
          type: string
        isPB:
          type: boolean
        penalty:
          type: string
          nullable: true
        gameVersion:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        inputDevice:
          type: string
          nullable: true
        isPublic:
          type: boolean
        sharedAt:
          type: string
          nullable: true
        publicNote:
          type: string
          nullable: true
        laps:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/LapRecord"
        timeOfDay:
          type: string
          nullable: true
        position:
          type: string
        trackTemperature:
          type: integer
          nullable: true
        airTemperature:
          type: integer
          nullable: true
        totalLaps:
          type: integer
          nullable: true
        pitSpeedLimit:
          type: integer
          nullable: true
        safetyCarStatus:
          type: integer
          nullable: true
        fuelInTank:
          type: number
          nullable: true
        ersDeployMode:
          type: integer
          nullable: true
        ersEnergyStored:
          type: number
          nullable: true
        ersDeployedThisLap:
          type: number
          nullable: true
        tyreWear:
          type: array
          nullable: true
          items:
            type: number
        wingDamage:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/WingDamage"
        tyreSurfaceTemps:
          type: array
          nullable: true
          items:
            type: number
        brakeTemps:
          type: array
          nullable: true
          items:
            type: number
        setupSnapshot:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CarSetupSnapshot"
        tyreStints:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TyreStintEntry"
        lapHistory:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/LapHistoryEntry"
        aiDifficulty:
          type: integer
          nullable: true
        topSpeedKph:
          type: number
          nullable: true
        avgThrottlePct:
          type: number
          nullable: true
        avgBrakePct:
          type: number
          nullable: true
        drsActivations:
          type: integer
          nullable: true
        maxRpm:
          type: integer
          nullable: true
        topGear:
          type: integer
          nullable: true
        fuelRemainingLaps:
          type: number
          nullable: true
        actualTyreCompound:
          type: string
          nullable: true
        tyreAgeLaps:
          type: integer
          nullable: true
        pitStops:
          type: integer
          nullable: true
        fuelCapacity:
          type: number
          nullable: true
        startingFuelKg:
          type: number
          nullable: true
        engineMaxRpm:
          type: integer
          nullable: true
        engineTemperature:
          type: integer
          nullable: true
        vehicleFiaFlags:
          type: integer
          nullable: true
        tyrePressureLive:
          type: array
          items:
            type: number
          nullable: true
        floorDamage:
          type: integer
          nullable: true
        diffuserDamage:
          type: integer
          nullable: true
        sidepodDamage:
          type: integer
          nullable: true
        gearBoxDamage:
          type: integer
          nullable: true
        engineDamage:
          type: integer
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - date
        - trackId
        - car
        - type
        - bestLap
        - avgLap
        - worstLap
        - s1
        - s2
        - s3
        - tires
        - fuelLoad
        - conditions
        - assists
        - rating
        - notes
        - isPB
        - isPublic
        - createdAt

    CreateSessionRequest:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        trackId:
          type: string
        car:
          type: string
        type:
          type: string
        bestLap:
          type: string
        avgLap:
          type: string
        worstLap:
          type: string
        s1:
          type: string
        s2:
          type: string
        s3:
          type: string
        tires:
          type: string
        fuelLoad:
          type: number
        conditions:
          type: string
        assists:
          type: string
        rating:
          type: integer
        notes:
          type: string
        penalty:
          type: string
        timeOfDay:
          type: string
        gameVersion:
          type: string
        platform:
          type: string
        inputDevice:
          type: string
        laps:
          type: array
          items:
            $ref: "#/components/schemas/LapRecord"
        position:
          type: string
        aiDifficulty:
          type: integer
        topSpeedKph:
          type: number
        avgThrottlePct:
          type: number
        avgBrakePct:
          type: number
        drsActivations:
          type: integer
        maxRpm:
          type: integer
        topGear:
          type: integer
        fuelRemainingLaps:
          type: number
      required:
        - id
        - date
        - trackId
        - car
        - type
        - bestLap
        - avgLap
        - worstLap
        - s1
        - s2
        - s3
        - tires
        - fuelLoad
        - conditions
        - assists
        - rating
        - notes

    ShareSessionRequest:
      type: object
      properties:
        publicNote:
          type: string

    ShareSessionResponse:
      type: object
      properties:
        isPublic:
          type: boolean
        sharedAt:
          type: string
          nullable: true
      required:
        - isPublic

    CommunitySessionRecord:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        trackId:
          type: string
        car:
          type: string
        type:
          type: string
        bestLap:
          type: string
        avgLap:
          type: string
        tires:
          type: string
        conditions:
          type: string
        penalty:
          type: string
          nullable: true
        gameVersion:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        inputDevice:
          type: string
          nullable: true
        publicNote:
          type: string
          nullable: true
        authorName:
          type: string
        isOwn:
          type: boolean
        sharedAt:
          type: string
          nullable: true
        rating:
          type: integer
      required:
        - id
        - date
        - trackId
        - car
        - type
        - bestLap
        - avgLap
        - tires
        - conditions
        - authorName
        - isOwn
        - rating

    SetupRecord:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        car:
          type: string
        trackId:
          type: string
        tag:
          type: string
        date:
          type: string
        frontWing:
          type: string
        rearWing:
          type: string
        frontARB:
          type: string
        rearARB:
          type: string
        frontRideHeight:
          type: string
        rearRideHeight:
          type: string
        frontSprings:
          type: string
        rearSprings:
          type: string
        brakeBias:
          type: string
        brakePressure:
