openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Sim Racing HQ API — F1 sim companion
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Racing session operations
  - name: setups
    description: Car setup operations
  - name: trackNotes
    description: Track notes operations
  - name: hardware
    description: Hardware settings operations
  - name: community
    description: Community setup sharing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    get:
      operationId: getSessions
      tags: [sessions]
      summary: Get all sessions for current user
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /sessions/{id}:
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{id}/share:
    post:
      operationId: shareSession
      tags: [sessions]
      summary: Toggle public sharing on a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareSessionRequest"
      responses:
        "200":
          description: Share state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /setups:
    get:
      operationId: getSetups
      tags: [setups]
      summary: Get all setups for current user
      responses:
        "200":
          description: List of setups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SetupRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createSetup
      tags: [setups]
      summary: Create a new setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSetupRequest"
      responses:
        "201":
          description: Setup created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /setups/{id}:
    delete:
      operationId: deleteSetup
      tags: [setups]
      summary: Delete a setup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Setup deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /setups/{id}/share:
    post:
      operationId: shareSetup
      tags: [setups]
      summary: Toggle public sharing on a setup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Share state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareSetupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /community/sessions:
    get:
      operationId: getCommunitySessions
      tags: [community]
      summary: Get all publicly shared sessions
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of community sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunitySessionRecord"

  /community/setups:
    get:
      operationId: getCommunitySetups
      tags: [community]
      summary: Get all publicly shared setups
      parameters:
        - name: trackId
          in: query
          required: false
          schema:
            type: string
        - name: car
          in: query
          required: false
          schema:
            type: string
        - name: tag
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of community setups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunitySetupRecord"

  /community/setups/{id}:
    get:
      operationId: getCommunitySetup
      tags: [community]
      summary: Get a single public community setup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Community setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunitySetupRecord"
        "404":
          $ref: "#/components/responses/NotFound"

  /community/setups/{id}/rate:
    post:
      operationId: rateSetup
      tags: [community]
      summary: Rate a community setup (1-5 stars)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateSetupRequest"
      responses:
        "200":
          description: Rating saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateSetupResponse"
        "400":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/NotFound"
        "404":
          $ref: "#/components/responses/NotFound"

  /community/setups/{id}/import:
    post:
      operationId: importSetup
      tags: [community]
      summary: Import a community setup into the caller's vault
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Setup imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /hardware:
    get:
      operationId: getHardware
      tags: [hardware]
      summary: Get all hardware profiles for current user
      responses:
        "200":
          description: List of hardware profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HardwareRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createHardware
      tags: [hardware]
      summary: Create a new hardware profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHardwareRequest"
      responses:
        "201":
          description: Hardware profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /hardware/{id}:
    delete:
      operationId: deleteHardware
      tags: [hardware]
      summary: Delete a hardware profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Hardware profile deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /track-notes/{trackId}:
    get:
      operationId: getTrackNotes
      tags: [trackNotes]
      summary: Get track notes for a specific track
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Track notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackNotesRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: upsertTrackNotes
      tags: [trackNotes]
      summary: Create or update track notes for a specific track
      parameters:
        - name: trackId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertTrackNotesRequest"
      responses:
        "200":
          description: Track notes saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackNotesRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CornerNote:
      type: object
      properties:
        id:
          type: string
        number:
          type: integer
        name:
          type: string
        gear:
          type: string
        brakingPoint:
          type: string
        lineNotes:
          type: string
        myNotes:
          type: string
      required:
        - id
        - number
        - name
        - gear
        - brakingPoint
        - lineNotes
        - myNotes

    LapRecord:
      type: object
      properties:
        lap:
          type: integer
        time:
          type: string
        s1:
          type: string
        s2:
          type: string
        s3:
          type: string
        tires:
          type: string
        penalty:
          type: string
      required:
        - lap
        - time
        - s1
        - s2
        - s3
        - tires
        - penalty

    SessionRecord:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        trackId:
          type: string
        car:
          type: string
        type:
          type: string
        bestLap:
          type: string
        avgLap:
          type: string
        worstLap:
          type: string
        s1:
          type: string
        s2:
          type: string
        s3:
          type: string
        tires:
          type: string
        fuelLoad:
          type: number
        conditions:
          type: string
        assists:
          type: string
        rating:
          type: integer
        notes:
          type: string
        isPB:
          type: boolean
        penalty:
          type: string
          nullable: true
        gameVersion:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        inputDevice:
          type: string
          nullable: true
        isPublic:
          type: boolean
        sharedAt:
          type: string
          nullable: true
        publicNote:
          type: string
          nullable: true
        laps:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/LapRecord"
        position:
          type: string
      required:
        - id
        - date
        - trackId
        - car
        - type
        - bestLap
        - avgLap
        - worstLap
        - s1
        - s2
        - s3
        - tires
        - fuelLoad
        - conditions
        - assists
        - rating
        - notes
        - isPB
        - isPublic

    CreateSessionRequest:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        trackId:
          type: string
        car:
          type: string
        type:
          type: string
        bestLap:
          type: string
        avgLap:
          type: string
        worstLap:
          type: string
        s1:
          type: string
        s2:
          type: string
        s3:
          type: string
        tires:
          type: string
        fuelLoad:
          type: number
        conditions:
          type: string
        assists:
          type: string
        rating:
          type: integer
        notes:
          type: string
        penalty:
          type: string
        gameVersion:
          type: string
        platform:
          type: string
        inputDevice:
          type: string
        laps:
          type: array
          items:
            $ref: "#/components/schemas/LapRecord"
        position:
          type: string
      required:
        - id
        - date
        - trackId
        - car
        - type
        - bestLap
        - avgLap
        - worstLap
        - s1
        - s2
        - s3
        - tires
        - fuelLoad
        - conditions
        - assists
        - rating
        - notes

    ShareSessionRequest:
      type: object
      properties:
        publicNote:
          type: string

    ShareSessionResponse:
      type: object
      properties:
        isPublic:
          type: boolean
        sharedAt:
          type: string
          nullable: true
      required:
        - isPublic

    CommunitySessionRecord:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        trackId:
          type: string
        car:
          type: string
        type:
          type: string
        bestLap:
          type: string
        avgLap:
          type: string
        tires:
          type: string
        conditions:
          type: string
        penalty:
          type: string
          nullable: true
        gameVersion:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        inputDevice:
          type: string
          nullable: true
        publicNote:
          type: string
          nullable: true
        authorName:
          type: string
        isOwn:
          type: boolean
        sharedAt:
          type: string
          nullable: true
        rating:
          type: integer
      required:
        - id
        - date
        - trackId
        - car
        - type
        - bestLap
        - avgLap
        - tires
        - conditions
        - authorName
        - isOwn
        - rating

    SetupRecord:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        car:
          type: string
        trackId:
          type: string
        tag:
          type: string
        date:
          type: string
        frontWing:
          type: string
        rearWing:
          type: string
        frontARB:
          type: string
        rearARB:
          type: string
        frontRideHeight:
          type: string
        rearRideHeight:
          type: string
        frontSprings:
          type: string
        rearSprings:
          type: string
        brakeBias:
          type: string
        brakePressure:
          type: string
        onThrottle:
          type: string
        offThrottle:
          type: string
        notes:
          type: string
        isPublic:
          type: boolean
        sharedAt:
          type: string
          nullable: true
        gameVersion:
          type: string
          nullable: true
      required:
        - id
        - label
        - car
        - trackId
        - tag
        - date
        - frontWing
        - rearWing
        - frontARB
        - rearARB
        - frontRideHeight
        - rearRideHeight
        - frontSprings
        - rearSprings
        - brakeBias
        - brakePressure
        - onThrottle
        - offThrottle
        - notes

    CommunitySetupRecord:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        car:
          type: string
        trackId:
          type: string
        tag:
          type: string
        date:
          type: string
        frontWing:
          type: string
        rearWing:
          type: string
        frontARB:
          type: string
        rearARB:
          type: string
        frontRideHeight:
          type: string
        rearRideHeight:
          type: string
        frontSprings:
          type: string
        rearSprings:
          type: string
        brakeBias:
          type: string
        brakePressure:
          type: string
        onThrottle:
          type: string
        offThrottle:
          type: string
        notes:
          type: string
        authorName:
          type: string
        isOwn:
          type: boolean
        avgRating:
          type: number
          nullable: true
        ratingCount:
          type: integer
        sharedAt:
          type: string
          nullable: true
      required:
        - id
        - label
        - car
        - trackId
        - tag
        - date
        - frontWing
        - rearWing
        - frontARB
        - rearARB
        - frontRideHeight
        - rearRideHeight
        - frontSprings
        - rearSprings
        - brakeBias
        - brakePressure
        - onThrottle
        - offThrottle
        - notes
        - authorName
        - isOwn
        - ratingCount

    ShareSetupResponse:
      type: object
      properties:
        isPublic:
          type: boolean
        sharedAt:
          type: string
          nullable: true
      required:
        - isPublic

    RateSetupRequest:
      type: object
      properties:
        stars:
          type: integer
          minimum: 1
          maximum: 5
      required:
        - stars

    RateSetupResponse:
      type: object
      properties:
        avgRating:
          type: number
          nullable: true
        ratingCount:
          type: integer
      required:
        - ratingCount

    CreateSetupRequest:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        car:
          type: string
        trackId:
          type: string
        tag:
          type: string
        date:
          type: string
        frontWing:
          type: string
        rearWing:
          type: string
        frontARB:
          type: string
        rearARB:
          type: string
        frontRideHeight:
          type: string
        rearRideHeight:
          type: string
        frontSprings:
          type: string
        rearSprings:
          type: string
        brakeBias:
          type: string
        brakePressure:
          type: string
        onThrottle:
          type: string
        offThrottle:
          type: string
        notes:
          type: string
        gameVersion:
          type: string
      required:
        - id
        - label
        - car
        - trackId
        - date
        - frontWing
        - rearWing
        - frontARB
        - rearARB
        - frontRideHeight
        - rearRideHeight
        - frontSprings
        - rearSprings
        - brakeBias
        - brakePressure
        - onThrottle
        - offThrottle
        - notes

    TrackNotesRecord:
      type: object
      properties:
        id:
          type: string
        trackId:
          type: string
        corners:
          type: array
          items:
            $ref: "#/components/schemas/CornerNote"
      required:
        - id
        - trackId
        - corners

    UpsertTrackNotesRequest:
      type: object
      properties:
        id:
          type: string
        corners:
          type: array
          items:
            $ref: "#/components/schemas/CornerNote"
      required:
        - id
        - corners

    HardwareRecord:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        peripheralType:
          type: string
        brand:
          type: string
        model:
          type: string
        trackId:
          type: string
        game:
          type: string
        date:
          type: string
        ffbStrength:
          type: string
        maxForce:
          type: string
        damper:
          type: string
        friction:
          type: string
        linearity:
          type: string
        steeringRange:
          type: string
        notes:
          type: string
      required:
        - id
        - label
        - peripheralType
        - brand
        - model
        - trackId
        - game
        - date
        - ffbStrength
        - maxForce
        - damper
        - friction
        - linearity
        - steeringRange
        - notes

    CreateHardwareRequest:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        peripheralType:
          type: string
        brand:
          type: string
        model:
          type: string
        trackId:
          type: string
        game:
          type: string
        date:
          type: string
        ffbStrength:
          type: string
        maxForce:
          type: string
        damper:
          type: string
        friction:
          type: string
        linearity:
          type: string
        steeringRange:
          type: string
        notes:
          type: string
      required:
        - id
        - label
        - peripheralType
        - brand
        - model
        - trackId
        - game
        - date
        - ffbStrength
        - maxForce
        - damper
        - friction
        - linearity
        - steeringRange
        - notes
